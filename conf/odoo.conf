[options]
; ── Database ──────────────────────────────────────────────────────────────────
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo
db_name = False

; ── Addons path ───────────────────────────────────────────────────────────────
; Order matters: custom → enterprise → community
addons_path = /mnt/extra-addons,/mnt/enterprise-addons,/usr/lib/python3/dist-packages/odoo/addons

; ── Server ────────────────────────────────────────────────────────────────────
http_interface = 0.0.0.0
http_port = 8069
longpolling_port = 8072
proxy_mode = False

; ── Workers ───────────────────────────────────────────────────────────────────
workers = 0

; ── Logging ───────────────────────────────────────────────────────────────────
log_level = info
log_handler = :INFO

; ── Filestore ─────────────────────────────────────────────────────────────────
data_dir = /var/lib/odoo

; ── Security ──────────────────────────────────────────────────────────────────
admin_passwd = admin
