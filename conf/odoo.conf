[options]
; ── Database ──────────────────────────────────────────────────────────────────
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo
db_name = False

; ── Addons path ───────────────────────────────────────────────────────────────
; Order matters: custom → enterprise → community
addons_path = /mnt/extra-addons,/mnt/enterprise-addons,/usr/lib/python3/dist-packages/odoo/addons

; ── Server ────────────────────────────────────────────────────────────────────
http_interface = 0.0.0.0
http_port = 8069
proxy_mode = True

; ── Workers (8 vCPU / 16 GB RAM) ─────────────────────────────────────────────
; workers = 0 means single-process mode (development only)
workers = 6
max_cron_threads = 2

; ── Resource limits ───────────────────────────────────────────────────────────
limit_memory_soft = 2147483648
limit_memory_hard = 2684354560
limit_time_cpu = 600
limit_time_real = 1200

; ── Logging ───────────────────────────────────────────────────────────────────
log_level = info
log_handler = :INFO

; ── Filestore ─────────────────────────────────────────────────────────────────
data_dir = /var/lib/odoo

; ── Security ──────────────────────────────────────────────────────────────────
admin_passwd = 9vF!qZ7@Lp2XrT8
